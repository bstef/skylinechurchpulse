<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skyline Pulse</title>
<link rel="icon" type="image/jpeg" href="assets/skylinelogosq.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#1F2A24; --paper:#F6F3EC; --surface:#FFFFFF; --brass:#B8925A; --pew:#3D5A4C; --rust:#A6503C; --line:#D8D1C0; --muted:#8A8375; --field-label:#5B5546; --banner-bg:#F3E4DE; --brass-soft:rgba(184,146,90,.14); --zebra:rgba(31,42,36,.02);
    --c0:#B8925A; --c0-soft:rgba(184,146,90,.14);
    --c1:#3D5A4C; --c1-soft:rgba(61,90,76,.14);
    --c2:#A6503C; --c2-soft:rgba(166,80,60,.14);
    --c3:#3C6E8F; --c3-soft:rgba(60,110,143,.14);
    --c4:#7A5C9E; --c4-soft:rgba(122,92,158,.14);
  }
  [data-theme="dark"]{
    --ink:#EDE8DA; --paper:#1B211D; --surface:#242B25; --brass:#D3AD78; --pew:#7FA491; --rust:#DD8266; --line:#3A423B; --muted:#9B9484; --field-label:#C9C2B0; --banner-bg:#3A241E; --brass-soft:rgba(211,173,120,.16); --zebra:rgba(255,255,255,.02);
    --c0:#D3AD78; --c0-soft:rgba(211,173,120,.18);
    --c1:#7FA491; --c1-soft:rgba(127,164,145,.18);
    --c2:#DD8266; --c2-soft:rgba(221,130,102,.18);
    --c3:#6FA0C4; --c3-soft:rgba(111,160,196,.18);
    --c4:#A98BC9; --c4-soft:rgba(169,139,201,.18);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Source Sans 3',sans-serif;transition:background .2s,color .2s;}
  .display{font-family:'Fraunces',Georgia,serif;}
  header{border-bottom:1px solid var(--line);}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
  .headtop{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;padding:28px 0 20px;}
  .logo{height:60px;display:block;margin-bottom:14px;}
  h1{font-size:40px;font-weight:700;margin:0;line-height:1;}
  button{cursor:pointer;font-family:inherit;}
  .btn-primary{display:flex;align-items:center;gap:8px;background:var(--pew);color:var(--paper);border:none;border-radius:3px;padding:12px 20px;font-size:15px;font-weight:600;box-shadow:0 2px 0 rgba(0,0,0,.15);}
  nav{display:flex;gap:4px;margin-top:24px;}
  nav button{padding:9px 18px;border:none;background:transparent;color:var(--ink);font-size:14px;font-weight:600;border-radius:3px 3px 0 0;}
  nav button.active{background:var(--ink);color:var(--paper);}
  main{max-width:1080px;margin:0 auto;padding:32px 24px 80px;}
  .empty{text-align:center;padding:80px 20px;color:var(--muted);}
  .empty .display{font-size:22px;margin-bottom:8px;color:var(--ink);}
  .stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:32px;}
  .pill{background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:18px 20px;flex:1 1 200px;}
  .pill .label{display:flex;align-items:center;gap:8px;color:var(--brass);margin-bottom:8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;}
  .pill .value{font-size:30px;font-weight:700;font-family:'Fraunces',Georgia,serif;}
  .pill .value span{font-size:16px;font-weight:400;color:var(--muted);}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:24px;margin-bottom:24px;}
  .card h3{margin:0 0 20px;font-size:18px;}
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  thead th{text-align:left;padding:13px 20px;border-bottom:1px solid var(--line);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;background:var(--zebra);}
  thead th.num,tbody td.num{text-align:right;}
  tbody tr:nth-child(even){background:var(--zebra);}
  tbody td{padding:16px 20px;border-bottom:1px solid var(--line);font-size:15px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  .log-row{cursor:pointer;}
  .log-row:hover{background:var(--brass-soft);}
  .service-badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
  .badge-0{background:var(--c0-soft);color:var(--c0);}
  .badge-1{background:var(--c1-soft);color:var(--c1);}
  .badge-2{background:var(--c2-soft);color:var(--c2);}
  .badge-3{background:var(--c3-soft);color:var(--c3);}
  .badge-4{background:var(--c4-soft);color:var(--c4);}
  .notes{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.4;}
  .unit{color:var(--muted);font-size:12px;}
  .actions-cell{text-align:right;white-space:nowrap;}
  .icon-btn{background:none;border:none;color:var(--muted);font-size:15px;width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;}
  .icon-btn:hover{background:var(--line);color:var(--ink);}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .filter-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;}
  .filter-chip.badge-0{background:var(--c0-soft);color:var(--c0);border-color:transparent;}
  .filter-chip.badge-1{background:var(--c1-soft);color:var(--c1);border-color:transparent;}
  .filter-chip.badge-2{background:var(--c2-soft);color:var(--c2);border-color:transparent;}
  .filter-chip.badge-3{background:var(--c3-soft);color:var(--c3);border-color:transparent;}
  .filter-chip.badge-4{background:var(--c4-soft);color:var(--c4);border-color:transparent;}
  .filter-chip.active{border-color:currentColor;box-shadow:inset 0 0 0 1px currentColor;}
  .filter-chip.all-active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .filter-empty{text-align:center;padding:50px 20px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:6px;}
  .edit-btn{color:var(--brass);}
  .modal-backdrop{position:fixed;inset:0;background:rgba(31,42,36,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal{background:var(--paper);border-radius:6px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--line);}
  .modal-head h2{margin:0;font-size:22px;}
  .modal-body{padding:24px;display:flex;flex-direction:column;gap:18px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field span{font-size:13px;font-weight:600;color:var(--field-label);}
  input,select,textarea{border:1px solid var(--line);border-radius:4px;padding:10px 12px;font-size:15px;background:var(--surface);color:var(--ink);outline:none;font-family:inherit;width:100%;}
  input[type=range]{accent-color:var(--brass);padding:0;}
  .row2{display:flex;gap:12px;}
  .save-btn{margin-top:4px;background:var(--pew);color:var(--paper);border:none;border-radius:4px;padding:13px;font-size:15px;font-weight:700;}
  .close-x{background:none;border:none;color:var(--ink);font-size:20px;}
  .error-banner{background:var(--banner-bg);border:1px solid var(--rust);color:var(--rust);padding:10px 14px;border-radius:4px;margin-bottom:20px;font-size:14px;}
  .chart-box{position:relative;height:260px;}
  #config-warning{background:var(--banner-bg);border:1px solid var(--rust);color:var(--rust);padding:16px 20px;border-radius:4px;margin:20px 0;font-size:14px;line-height:1.5;}
  code{background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:3px;}
  [data-theme="dark"] code{background:rgba(255,255,255,0.1);}
  .theme-toggle{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:3px;font-size:16px;}
  .btn-secondary{display:flex;align-items:center;gap:8px;background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:3px;padding:12px 18px;font-size:15px;font-weight:600;}
  .btn-secondary:disabled{opacity:.5;cursor:not-allowed;}
  .detail-date{color:var(--muted);font-size:14px;margin-top:-8px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0;}
  .detail-item{background:var(--zebra);border:1px solid var(--line);border-radius:4px;padding:14px 16px;}
  .detail-label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px;}
  .detail-value{font-size:24px;font-weight:700;font-family:'Fraunces',Georgia,serif;}
  .detail-value .unit{font-size:14px;}
  .detail-notes-block{margin-bottom:4px;}
  .detail-notes-block p{margin:6px 0 0;line-height:1.5;}
  .detail-actions{display:flex;gap:10px;margin-top:4px;}
  .detail-actions .save-btn{flex:1;margin-top:0;}
  .btn-danger{flex:1;background:none;border:1px solid var(--rust);color:var(--rust);border-radius:4px;padding:13px;font-size:15px;font-weight:700;}
  footer{border-top:1px solid var(--line);}
  .footer-wrap{padding:28px 24px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;}
  .footer-links{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
  .footer-links a{color:var(--brass);text-decoration:none;font-size:14px;font-weight:600;}
  .footer-links a:hover{text-decoration:underline;}
  .footer-meta{color:var(--muted);font-size:12px;}
  .pco-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
  .badge-unmatched{background:var(--zebra);color:var(--muted);border:1px dashed var(--line);}
  .status-pill{border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;letter-spacing:.02em;white-space:nowrap;}
  .status-logged{background:var(--pew);color:var(--paper);}
  .status-pending{background:var(--brass-soft);color:var(--brass);border:1px solid var(--brass);}
  .pco-status-group{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;}
  .pco-linked-note{background:var(--brass-soft);color:var(--brass);border-radius:4px;padding:10px 14px;font-size:13px;font-weight:600;margin-top:-8px;}
  .cal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow-row{margin-bottom:6px;}
  .cal-dow{text-align:center;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:4px 0;}
  .cal-cell{background:var(--surface);border:1px solid var(--line);border-radius:4px;min-height:96px;padding:8px;display:flex;flex-direction:column;gap:6px;}
  .cal-cell-empty{background:transparent;border-color:transparent;}
  .cal-cell-today{box-shadow:inset 0 0 0 1px var(--brass);}
  .cal-daynum{font-size:12px;font-weight:700;color:var(--muted);}
  .cal-cell-today .cal-daynum{color:var(--brass);}
  .cal-chips{display:flex;flex-direction:column;gap:4px;}
  .cal-chip{border:none;border-radius:4px;padding:3px 6px;font-size:11px;font-weight:700;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .cal-chip:hover{opacity:.8;}
  .cal-chip.cal-chip-pending{background:transparent;border:1px dashed currentColor;}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="headtop">
      <div>
        <img class="logo" id="logo-img" src="assets/1500w-skyline-identity-logo-blue-green-black-png.png" alt="Skyline Church">
        <h1 class="display">Skyline Pulse</h1>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode"></button>
        <button class="btn-secondary" id="export-btn" title="Export ledger as CSV">⬇ Export</button>
        <button class="btn-primary" id="open-form-btn">+ Log a Service</button>
      </div>
    </div>
    <nav>
      <button id="tab-log" class="active">Ledger</button>
      <button id="tab-calendar">Calendar</button>
      <button id="tab-analytics">Analytics</button>
      <button id="tab-pco">Planning Center</button>
    </nav>
  </div>
</header>

<main>
  <div id="error-slot"></div>
  <div id="config-slot"></div>
  <div id="content"></div>
</main>

<footer>
  <div class="wrap footer-wrap">
    <div class="footer-links">
      <a href="http://www.skylinechurchnj.org" target="_blank" rel="noopener noreferrer">Skyline Church Website</a>
      <a href="https://skylinechurchnj.churchcenter.com/registrations/events" target="_blank" rel="noopener noreferrer">Planning Center · Events</a>
    </div>
    <div class="footer-meta">Skyline Church · NJ &nbsp;·&nbsp; Skyline Pulse Service Ledger &nbsp;·&nbsp; Internal use only &nbsp;·&nbsp; © <span id="footer-year"></span></div>
  </div>
</footer>

<div id="modal-slot"></div>

<script>
/* ====================== CONFIGURE THIS ======================
   Paste your Supabase project URL and anon (public) key below.
   Both are safe to expose in frontend code — access is controlled
   by the Row Level Security policies in db/schema.sql.
   ============================================================== */
const SUPABASE_URL = "https://uvwgotklgfhvqbcpdqqb.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2d2dvdGtsZ2ZodnFiY3BkcXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0Nzc5NDQsImV4cCI6MjA5OTA1Mzk0NH0.gMBS_RU3yHkk2O7BjiUWwPOofLpiOtS0oOVylU9e2Dc";
/* ============================================================== */

const SERVICE_TYPES = ["9:30 AM", "11:00 AM", "Worship Night", "SkyYouth", "Special Event"];
const LOGO_LIGHT = "assets/1500w-skyline-identity-logo-blue-green-black-png.png";
const LOGO_DARK = "assets/skyline-dark-logo.png";

/* Best-effort mapping from Planning Center Service Type folder names to the
   SERVICE_TYPES above. Tune these once you see your real PCO folder names —
   unmatched plans just fall back to the "Select a service…" placeholder. */
const PCO_SERVICE_TYPE_ALIASES = {
  "9:30 AM": ["9:30", "930"],
  "11:00 AM": ["11:00", "1100", "11 am"],
  "Worship Night": ["worship night"],
  "SkyYouth": ["skyyouth", "sky youth", "youth"],
  "Special Event": ["special event"],
};

let sb = null;
let entries = [];
let view = "log";
let charts = [];
let filterType = "All";
let pcoPlans = [];
let pcoError = null;
let pcoLoaded = false;
let calendarMonth = null;

function getCalendarEvents() {
  const loggedIds = new Set(entries.filter(e => e.pco_plan_id).map(e => e.pco_plan_id));
  const events = entries.map(e => ({
    date: e.service_date,
    kind: "entry",
    id: e.id,
    serviceType: e.service_type,
    label: e.service_type,
    logged: true,
  }));
  pcoPlans.forEach(p => {
    if (loggedIds.has(p.id)) return;
    events.push({
      date: p.sort_date.slice(0, 10),
      kind: "pco",
      id: p.id,
      serviceType: guessServiceType(p.service_type_name),
      label: p.title,
      logged: false,
    });
  });
  return events;
}

function badgeClass(serviceType) {
  const idx = SERVICE_TYPES.indexOf(serviceType);
  return `badge-${idx >= 0 ? idx % 5 : 0}`;
}

function guessServiceType(pcoName) {
  const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  const n = norm(pcoName);
  for (const s of SERVICE_TYPES) if (norm(s) === n) return s;
  for (const [s, aliases] of Object.entries(PCO_SERVICE_TYPE_ALIASES)) {
    if (aliases.some(a => n.includes(norm(a)))) return s;
  }
  return "";
}

function getStoredTheme() {
  return localStorage.getItem("skyline-theme") ||
    (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
}
function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("skyline-theme", theme);
  document.getElementById("theme-toggle").textContent = theme === "dark" ? "☀" : "☾";
  document.getElementById("logo-img").src = theme === "dark" ? LOGO_DARK : LOGO_LIGHT;
  if (view === "analytics" && charts.length) { destroyCharts(); renderCharts(); }
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
}

function configured() {
  return SUPABASE_URL !== "YOUR_SUPABASE_PROJECT_URL" && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";
}

function fmtDate(d) {
  const dt = new Date(d + "T12:00:00");
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function showError(msg) {
  document.getElementById("error-slot").innerHTML = msg ? `<div class="error-banner">${msg}</div>` : "";
}

async function loadEntries() {
  if (!configured()) return;
  const { data, error } = await sb.from("service_entries").select("*").order("service_date", { ascending: false });
  if (error) { showError("Couldn't load entries: " + error.message); return; }
  entries = data;
  render();
}

function saveErrorMessage(error, payload) {
  if (error.code === "23505" && payload.pco_plan_id) {
    return `You've already logged "${payload.service_type}" for this Planning Center plan.`;
  }
  return "Couldn't save: " + error.message;
}

async function addEntry(payload) {
  const { error } = await sb.from("service_entries").insert([payload]);
  if (error) { showError(saveErrorMessage(error, payload)); return false; }
  showError("");
  await loadEntries();
  return true;
}

async function removeEntry(id) {
  const { error } = await sb.from("service_entries").delete().eq("id", id);
  if (error) { showError("Couldn't delete: " + error.message); return; }
  await loadEntries();
}

async function updateEntry(id, payload) {
  const { error } = await sb.from("service_entries").update(payload).eq("id", id);
  if (error) { showError(saveErrorMessage(error, payload)); return false; }
  showError("");
  await loadEntries();
  return true;
}

function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

function render() {
  const content = document.getElementById("content");
  document.getElementById("tab-log").classList.toggle("active", view === "log");
  document.getElementById("tab-calendar").classList.toggle("active", view === "calendar");
  document.getElementById("tab-analytics").classList.toggle("active", view === "analytics");
  document.getElementById("tab-pco").classList.toggle("active", view === "pco");
  document.getElementById("export-btn").disabled = entries.length === 0;
  destroyCharts();

  if (!configured()) {
    document.getElementById("config-slot").innerHTML = `<div id="config-warning">
      <strong>Not connected yet.</strong> Open <code>index.html</code> and set <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> at the top of the script to your Supabase project's values, then redeploy.
    </div>`;
    content.innerHTML = "";
    return;
  } else {
    document.getElementById("config-slot").innerHTML = "";
  }

  if (view === "pco") {
    content.innerHTML = renderPco();
    const refreshBtn = document.getElementById("pco-refresh");
    if (refreshBtn) refreshBtn.addEventListener("click", () => loadPcoPlans(true));
    content.querySelectorAll(".pco-log-btn").forEach(btn => {
      btn.addEventListener("click", () => openModal(null, pcoPlans.find(p => p.id === btn.dataset.id)));
    });
    content.querySelectorAll(".pco-view-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const entry = entries.find(e => e.id === btn.dataset.id);
        if (entry) openDetail(entry);
      });
    });
    if (!pcoLoaded) loadPcoPlans();
    return;
  }

  if (view === "calendar") {
    content.innerHTML = renderCalendar();
    document.getElementById("cal-prev").addEventListener("click", () => {
      calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() - 1, 1);
      render();
    });
    document.getElementById("cal-next").addEventListener("click", () => {
      calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + 1, 1);
      render();
    });
    document.getElementById("cal-today").addEventListener("click", () => { calendarMonth = null; render(); });
    content.querySelectorAll(".cal-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        if (chip.dataset.kind === "entry") {
          const entry = entries.find(e => e.id === chip.dataset.id);
          if (entry) openDetail(entry);
        } else {
          const plan = pcoPlans.find(p => p.id === chip.dataset.id);
          if (plan) openModal(null, plan);
        }
      });
    });
    if (!pcoLoaded) loadPcoPlans();
    return;
  }

  if (entries.length === 0) {
    content.innerHTML = `<div class="empty">
      <div class="display">The ledger is empty.</div>
      <div>Log your first service to start tracking attendance, unity, engagement, and loudness.</div>
    </div>`;
    return;
  }

  if (view === "log") {
    content.innerHTML = renderLog();
    content.querySelectorAll(".del-btn").forEach(btn => {
      btn.addEventListener("click", (e) => { e.stopPropagation(); removeEntry(btn.dataset.id); });
    });
    content.querySelectorAll(".edit-btn").forEach(btn => {
      btn.addEventListener("click", (e) => { e.stopPropagation(); openModal(entries.find(en => en.id === btn.dataset.id)); });
    });
    content.querySelectorAll(".log-row").forEach(row => {
      row.addEventListener("click", () => openDetail(entries.find(en => en.id === row.dataset.id)));
    });
    content.querySelectorAll(".filter-chip").forEach(chip => {
      chip.addEventListener("click", () => { filterType = chip.dataset.filter; render(); });
    });
  } else {
    content.innerHTML = renderAnalyticsShell();
    renderCharts();
  }
}

function renderLog() {
  const typesPresent = SERVICE_TYPES.filter(s => entries.some(e => e.service_type === s));
  const filterRow = `<div class="filter-row">
    <button class="filter-chip ${filterType === "All" ? "all-active" : ""}" data-filter="All">All (${entries.length})</button>
    ${typesPresent.map(s => {
      const count = entries.filter(e => e.service_type === s).length;
      return `<button class="filter-chip ${badgeClass(s)} ${filterType === s ? "active" : ""}" data-filter="${escapeHtml(s)}">${escapeHtml(s)} (${count})</button>`;
    }).join("")}
  </div>`;

  const filtered = filterType === "All" ? entries : entries.filter(e => e.service_type === filterType);

  if (filtered.length === 0) {
    return `${filterRow}<div class="filter-empty">No entries for ${escapeHtml(filterType)}.</div>`;
  }

  const rows = filtered.map(e => `
    <tr class="log-row" data-id="${e.id}">
      <td>${fmtDate(e.service_date)}</td>
      <td><span class="service-badge ${badgeClass(e.service_type)}">${escapeHtml(e.service_type)}</span>${e.notes ? `<div class="notes">${escapeHtml(e.notes)}</div>` : ""}</td>
      <td class="num">${e.attendance.toLocaleString()}</td>
      <td class="num">${e.unity}<span class="unit">/5</span></td>
      <td class="num">${e.engagement}<span class="unit">/5</span></td>
      <td class="num">${e.loudness_db}<span class="unit"> dB</span></td>
      <td class="actions-cell">
        <button class="icon-btn edit-btn" data-id="${e.id}" title="Edit">✎</button>
        <button class="icon-btn del-btn" data-id="${e.id}" title="Delete">✕</button>
      </td>
    </tr>`).join("");
  return `${filterRow}<table>
    <thead><tr><th>Date</th><th>Service</th><th class="num">Attend.</th><th class="num">Unity</th><th class="num">Engage.</th><th class="num">dB</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}

function csvEscape(val) {
  const s = String(val ?? "");
  return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function exportCSV() {
  if (!entries.length) return;
  const header = ["Date", "Service", "Attendance", "Unity (1-5)", "Engagement (1-5)", "Loudness (dB)", "Notes"];
  const rows = entries.map(e => [e.service_date, e.service_type, e.attendance, e.unity, e.engagement, e.loudness_db, e.notes || ""]);
  const csv = [header, ...rows].map(r => r.map(csvEscape).join(",")).join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `skyline-pulse-ledger-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderAnalyticsShell() {
  const sorted = [...entries].sort((a,b) => a.service_date.localeCompare(b.service_date));
  const avgAttendance = avg(entries.map(e => e.attendance));
  const avgUnity = avg(entries.map(e => e.unity));
  const avgEngagement = avg(entries.map(e => e.engagement));
  const avgLoudness = avg(entries.map(e => e.loudness_db));

  return `
    <div class="stats">
      <div class="pill"><div class="label">Avg Attendance</div><div class="value">${avgAttendance.toFixed(0)}</div></div>
      <div class="pill"><div class="label">Avg Unity</div><div class="value">${avgUnity.toFixed(1)}<span>/5</span></div></div>
      <div class="pill"><div class="label">Avg Engagement</div><div class="value">${avgEngagement.toFixed(1)}<span>/5</span></div></div>
      <div class="pill"><div class="label">Avg Loudness</div><div class="value">${avgLoudness.toFixed(0)}<span> dB</span></div></div>
    </div>
    <div class="card"><h3 class="display">Attendance, last ${Math.min(sorted.length,8)} services</h3><div class="chart-box"><canvas id="chart-attendance"></canvas></div></div>
    <div class="card"><h3 class="display">Unity &amp; Engagement (1–5)</h3><div class="chart-box"><canvas id="chart-unity"></canvas></div></div>
    <div class="card"><h3 class="display">Loudness (dB)</h3><div class="chart-box"><canvas id="chart-loudness"></canvas></div></div>
  `;
}

function themeColors() {
  const cs = getComputedStyle(document.documentElement);
  const v = (name) => cs.getPropertyValue(name).trim();
  return { ink: v("--ink"), pew: v("--pew"), brass: v("--brass"), rust: v("--rust"), line: v("--line") };
}

function renderCharts() {
  const sorted = [...entries].sort((a,b) => a.service_date.localeCompare(b.service_date)).slice(-8);
  const labels = sorted.map(e => fmtDate(e.service_date));
  const t = themeColors();
  Chart.defaults.color = t.ink;
  Chart.defaults.borderColor = t.line;

  const c1 = new Chart(document.getElementById("chart-attendance"), {
    type: "bar",
    data: { labels, datasets: [{ label: "Attendance", data: sorted.map(e=>e.attendance), backgroundColor: t.pew, borderRadius: 3 }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display:false } }, y: { grid: { color:t.line } } } }
  });

  const c2 = new Chart(document.getElementById("chart-unity"), {
    type: "line",
    data: { labels, datasets: [
      { label: "Unity", data: sorted.map(e=>e.unity), borderColor: t.brass, backgroundColor:t.brass, tension:.3 },
      { label: "Engagement", data: sorted.map(e=>e.engagement), borderColor: t.rust, backgroundColor:t.rust, tension:.3 },
    ]},
    options: { scales: { y: { min:0, max:5, grid:{color:t.line} }, x:{grid:{display:false}} } }
  });

  const c3 = new Chart(document.getElementById("chart-loudness"), {
    type: "line",
    data: { labels, datasets: [{ label: "Loudness (dB)", data: sorted.map(e=>e.loudness_db), borderColor: t.pew, backgroundColor:t.pew, tension:.3 }] },
    options: { plugins: { legend: { display:false } }, scales: { x:{grid:{display:false}}, y:{grid:{color:t.line}} } }
  });

  charts = [c1, c2, c3];
}

async function loadPcoPlans(force) {
  if (!force && pcoLoaded) return;
  pcoError = null;
  try {
    const res = await fetch("/api/pco-plans");
    const body = await res.json().catch(() => ({}));
    if (!res.ok) {
      pcoError = body.error || `Planning Center request failed (${res.status}).`;
      pcoPlans = [];
    } else {
      pcoPlans = body.plans || [];
    }
  } catch (err) {
    pcoError = "Couldn't reach Planning Center: " + err.message;
    pcoPlans = [];
  }
  pcoLoaded = true;
  render();
}

function renderPco() {
  const header = `<div class="pco-header">
    <div>
      <h3 class="display" style="margin:0 0 4px;">Planning Center — Plans</h3>
      <div style="color:var(--muted);font-size:13px;">Pulled live from your Services Service Types. Log Pulse details for any plan below.</div>
    </div>
    <button class="btn-secondary" id="pco-refresh">↻ Refresh</button>
  </div>`;

  if (!pcoLoaded) {
    return `${header}<div class="empty"><div class="display">Loading Planning Center plans…</div></div>`;
  }
  if (pcoError) {
    return `${header}<div class="error-banner">${escapeHtml(pcoError)}</div>`;
  }
  if (pcoPlans.length === 0) {
    return `${header}<div class="empty">
      <div class="display">No plans found.</div>
      <div>Nothing scheduled in the last 14 days or next 45 days across your Service Types.</div>
    </div>`;
  }

  const entriesByPlan = {};
  entries.forEach(e => {
    if (!e.pco_plan_id) return;
    (entriesByPlan[e.pco_plan_id] ||= []).push(e);
  });

  const rows = pcoPlans.map(p => {
    const matched = guessServiceType(p.service_type_name);
    const badge = matched
      ? `<span class="service-badge ${badgeClass(matched)}">${escapeHtml(matched)}</span>`
      : `<span class="service-badge badge-unmatched">${escapeHtml(p.service_type_name)}</span>`;
    const linked = entriesByPlan[p.id] || [];
    const loggedPills = linked.map(e =>
      `<button class="status-pill status-logged pco-view-btn" data-id="${escapeHtml(e.id)}">${escapeHtml(e.service_type)} ✓</button>`
    ).join("");
    const logBtn = `<button class="status-pill status-pending pco-log-btn" data-id="${escapeHtml(p.id)}">${linked.length ? "+ Log another" : "Needs details"}</button>`;
    return `<tr>
      <td>${fmtDate(p.sort_date.slice(0,10))}</td>
      <td>${badge}<div class="notes">${escapeHtml(p.title)}${p.series_title ? " · " + escapeHtml(p.series_title) : ""}</div></td>
      <td class="actions-cell"><div class="pco-status-group">${loggedPills}${logBtn}</div></td>
    </tr>`;
  }).join("");

  return `${header}<table>
    <thead><tr><th>Date</th><th>Plan</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderCalendar() {
  if (!calendarMonth) {
    const t = new Date();
    calendarMonth = new Date(t.getFullYear(), t.getMonth(), 1);
  }
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();
  const monthLabel = calendarMonth.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0, 10);

  const byDate = {};
  getCalendarEvents().forEach(ev => { (byDate[ev.date] ||= []).push(ev); });

  const header = `<div class="cal-header">
    <button class="btn-secondary" id="cal-prev" title="Previous month">‹</button>
    <h3 class="display" style="margin:0;min-width:200px;text-align:center;">${monthLabel}</h3>
    <button class="btn-secondary" id="cal-next" title="Next month">›</button>
    <button class="btn-secondary" id="cal-today" style="margin-left:auto;">Today</button>
  </div>`;

  const dowLabels = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const dowRow = dowLabels.map(d => `<div class="cal-dow">${d}</div>`).join("");

  let cells = "";
  for (let i = 0; i < firstDow; i++) cells += `<div class="cal-cell cal-cell-empty"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    const dayEvents = byDate[dateStr] || [];
    const chips = dayEvents.map(ev => {
      const badgeCls = ev.serviceType ? badgeClass(ev.serviceType) : "badge-unmatched";
      const label = ev.serviceType || ev.label;
      const statusCls = ev.logged ? "cal-chip-logged" : "cal-chip-pending";
      return `<button class="cal-chip ${badgeCls} ${statusCls}" data-kind="${ev.kind}" data-id="${escapeHtml(ev.id)}" title="${escapeHtml(ev.label)}">${escapeHtml(label)}</button>`;
    }).join("");
    cells += `<div class="cal-cell ${dateStr === todayStr ? "cal-cell-today" : ""}">
      <div class="cal-daynum">${day}</div>
      <div class="cal-chips">${chips}</div>
    </div>`;
  }

  return `${header}
    <div class="cal-grid cal-dow-row">${dowRow}</div>
    <div class="cal-grid">${cells}</div>`;
}

function openDetail(entry) {
  if (!entry) return;
  document.getElementById("modal-slot").innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal">
        <div class="modal-head">
          <div>
            <h2 class="display"><span class="service-badge ${badgeClass(entry.service_type)}">${escapeHtml(entry.service_type)}</span></h2>
          </div>
          <button class="close-x" id="modal-close">✕</button>
        </div>
        <div class="modal-body">
          <div class="detail-date">${fmtDate(entry.service_date)}</div>
          <div class="detail-grid">
            <div class="detail-item"><span class="detail-label">Attendance</span><span class="detail-value">${entry.attendance.toLocaleString()}</span></div>
            <div class="detail-item"><span class="detail-label">Loudness</span><span class="detail-value">${entry.loudness_db}<span class="unit"> dB</span></span></div>
            <div class="detail-item"><span class="detail-label">Unity</span><span class="detail-value">${entry.unity}<span class="unit">/5</span></span></div>
            <div class="detail-item"><span class="detail-label">Engagement</span><span class="detail-value">${entry.engagement}<span class="unit">/5</span></span></div>
          </div>
          ${entry.notes ? `<div class="detail-notes-block"><span class="detail-label">Notes</span><p>${escapeHtml(entry.notes)}</p></div>` : ""}
          <div class="detail-actions">
            <button class="save-btn" id="detail-edit">Edit Entry</button>
            <button class="btn-danger" id="detail-delete">Delete</button>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("modal-backdrop").addEventListener("click", (e) => { if (e.target.id === "modal-backdrop") closeModal(); });
  document.getElementById("detail-edit").addEventListener("click", () => openModal(entry));
  document.getElementById("detail-delete").addEventListener("click", async () => {
    await removeEntry(entry.id);
    closeModal();
  });
}

function openModal(entry, pcoPlan) {
  const editing = !!entry;
  const today = new Date().toISOString().slice(0,10);
  const v = {
    date: entry ? entry.service_date : (pcoPlan ? pcoPlan.sort_date.slice(0,10) : today),
    service: entry ? entry.service_type : (pcoPlan ? guessServiceType(pcoPlan.service_type_name) : ""),
    attendance: entry ? entry.attendance : "",
    unity: entry ? entry.unity : 3,
    engagement: entry ? entry.engagement : 3,
    loudness: entry ? entry.loudness_db : "",
    notes: entry ? (entry.notes || "") : "",
  };
  document.getElementById("modal-slot").innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal">
        <div class="modal-head"><h2 class="display">${editing ? "Edit Service" : "Log a Service"}</h2><button class="close-x" id="modal-close">✕</button></div>
        <div class="modal-body">
          ${pcoPlan ? `<div class="pco-linked-note">From Planning Center: <strong>${escapeHtml(pcoPlan.title)}</strong></div>` : ""}
          <div class="row2">
            <label class="field" style="flex:1"><span>Date</span><input type="date" id="f-date" value="${v.date}"></label>
            <label class="field" style="flex:1"><span>Service *</span>
              <select id="f-service" required>
                <option value="" ${v.service?"":"selected"} disabled>Select a service…</option>
                ${SERVICE_TYPES.map(s=>`<option value="${s}" ${s===v.service?"selected":""}>${s}</option>`).join("")}
              </select>
            </label>
          </div>
          <label class="field"><span>Attendance (headcount)</span><input type="number" min="0" id="f-attendance" placeholder="e.g. 214" value="${v.attendance}"></label>
          <label class="field"><span id="unity-label">Oneness in One Voice (worship unity) — ${v.unity}/5</span><input type="range" min="1" max="5" value="${v.unity}" id="f-unity"></label>
          <label class="field"><span id="engagement-label">Audience Engagement — ${v.engagement}/5</span><input type="range" min="1" max="5" value="${v.engagement}" id="f-engagement"></label>
          <label class="field"><span>Loudness (dB)</span><input type="number" min="0" id="f-loudness" placeholder="e.g. 92" value="${v.loudness}"></label>
          <label class="field"><span>Notes (optional)</span><textarea rows="2" id="f-notes" placeholder="Anything worth remembering about this service…">${escapeHtml(v.notes)}</textarea></label>
          <button class="save-btn" id="f-save">${editing ? "Update Entry" : "Save Entry"}</button>
        </div>
      </div>
    </div>`;

  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("modal-backdrop").addEventListener("click", (e) => { if (e.target.id === "modal-backdrop") closeModal(); });
  document.getElementById("f-unity").addEventListener("input", (e) => {
    document.getElementById("unity-label").textContent = `Oneness in One Voice (worship unity) — ${e.target.value}/5`;
  });
  document.getElementById("f-engagement").addEventListener("input", (e) => {
    document.getElementById("engagement-label").textContent = `Audience Engagement — ${e.target.value}/5`;
  });
  document.getElementById("f-save").addEventListener("click", async () => {
    const attendance = document.getElementById("f-attendance").value;
    const loudness = document.getElementById("f-loudness").value;
    const serviceType = document.getElementById("f-service").value;
    if (!serviceType) { showError("Please select a service."); return; }
    if (!attendance || !loudness) { showError("Attendance and loudness (dB) are required."); return; }
    const payload = {
      service_date: document.getElementById("f-date").value,
      service_type: serviceType,
      attendance: Number(attendance),
      unity: Number(document.getElementById("f-unity").value),
      engagement: Number(document.getElementById("f-engagement").value),
      loudness_db: Number(loudness),
      notes: document.getElementById("f-notes").value.trim(),
      pco_plan_id: entry ? (entry.pco_plan_id ?? null) : (pcoPlan ? pcoPlan.id : null),
    };
    const ok = editing ? await updateEntry(entry.id, payload) : await addEntry(payload);
    if (ok) closeModal();
  });
}
function closeModal() { document.getElementById("modal-slot").innerHTML = ""; }

document.getElementById("open-form-btn").addEventListener("click", () => openModal());
document.getElementById("tab-log").addEventListener("click", () => { view = "log"; render(); });
document.getElementById("tab-calendar").addEventListener("click", () => { view = "calendar"; render(); });
document.getElementById("tab-analytics").addEventListener("click", () => { view = "analytics"; render(); });
document.getElementById("tab-pco").addEventListener("click", () => { view = "pco"; render(); });
document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
document.getElementById("export-btn").addEventListener("click", exportCSV);
document.getElementById("footer-year").textContent = new Date().getFullYear();

applyTheme(getStoredTheme());

if (configured()) {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  loadEntries();
} else {
  render();
}
</script>
