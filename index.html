<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skyline Pulse</title>
<link rel="icon" type="image/jpeg" href="assets/skylinelogosq.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --ink:#1F2A24; --paper:#F6F3EC; --surface:#FFFFFF; --brass:#B8925A; --pew:#2876FF; --rust:#A6503C; --line:#D8D1C0; --muted:#8A8375; --field-label:#5B5546; --banner-bg:#F3E4DE; --brass-soft:rgba(184,146,90,.14); --zebra:rgba(31,42,36,.02);
    --c0:#B8925A; --c0-soft:rgba(184,146,90,.14);
    --c1:#2876FF; --c1-soft:rgba(40,118,255,.12);
    --c2:#A6503C; --c2-soft:rgba(166,80,60,.14);
    --c3:#2E9C8F; --c3-soft:rgba(46,156,143,.14);
    --c4:#7A5C9E; --c4-soft:rgba(122,92,158,.14);
  }
  [data-theme="dark"]{
    --ink:#EDE8DA; --paper:#1C1E21; --surface:#26282B; --brass:#D3AD78; --pew:#5B93FF; --rust:#DD8266; --line:#35373A; --muted:#96989C; --field-label:#C7C5C0; --banner-bg:#3A241E; --brass-soft:rgba(211,173,120,.16); --zebra:rgba(255,255,255,.02);
    --c0:#D3AD78; --c0-soft:rgba(211,173,120,.18);
    --c1:#5B93FF; --c1-soft:rgba(91,147,255,.18);
    --c2:#DD8266; --c2-soft:rgba(221,130,102,.18);
    --c3:#4FB5A8; --c3-soft:rgba(79,181,168,.18);
    --c4:#A98BC9; --c4-soft:rgba(169,139,201,.18);
  }
  [data-theme="ocean"]{
    --ink:#DCEEF0; --paper:#0E2229; --surface:#142E37; --brass:#E3BC7C; --pew:#52BF93; --rust:#E28F6E; --line:#24444E; --muted:#86AEB6; --field-label:#BFDBDD; --banner-bg:#3A2620; --brass-soft:rgba(227,188,124,.18); --zebra:rgba(255,255,255,.025);
    --c0:#E3BC7C; --c0-soft:rgba(227,188,124,.18);
    --c1:#52BF93; --c1-soft:rgba(82,191,147,.18);
    --c2:#E28F6E; --c2-soft:rgba(226,143,110,.18);
    --c3:#6EC5E8; --c3-soft:rgba(110,197,232,.18);
    --c4:#A79AE0; --c4-soft:rgba(167,154,224,.18);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Source Sans 3',sans-serif;transition:background .2s,color .2s;}
  .display{font-family:'Fraunces',Georgia,serif;}
  header{border-bottom:1px solid var(--line);}
  .hero-banner{width:100%;height:44px;display:block;margin-top:6px;}
  .hero-skyline{fill:var(--ink);opacity:.10;}
  .hero-pulse-line{fill:none;stroke:var(--brass);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
  .hero-cross line{stroke:var(--rust);stroke-width:2.5;stroke-linecap:round;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
  .headtop{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;padding:28px 0 20px;}
  .logo{height:64px;display:block;}
  button{cursor:pointer;font-family:inherit;}
  .theme-toggle,.btn-primary,.btn-secondary{height:44px;border-radius:6px;}
  .theme-toggle{width:44px;}
  .btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--pew);color:var(--paper);border:none;padding:0 20px;font-size:15px;font-weight:600;box-shadow:0 2px 0 rgba(0,0,0,.15);white-space:nowrap;}
  .page-toggle{display:flex;gap:6px;margin-top:24px;}
  .page-toggle-btn{border:1px solid var(--line);background:var(--surface);color:var(--muted);padding:8px 20px;font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;border-radius:20px;}
  .page-toggle-btn.active{background:var(--brass);color:var(--paper);border-color:var(--brass);}
  nav{display:flex;gap:4px;margin-top:14px;overflow-x:auto;}
  nav button{padding:9px 18px;border:none;background:transparent;color:var(--ink);font-size:14px;font-weight:600;border-radius:3px 3px 0 0;white-space:nowrap;flex-shrink:0;}
  nav button.active{background:var(--ink);color:var(--paper);}
  nav button.page-hidden{display:none;}
  main{max-width:1080px;margin:0 auto;padding:32px 24px 80px;}
  .table-scroll{overflow-x:auto;}
  @media (max-width: 640px){
    .logo{height:44px;}
    .headtop{padding:20px 0 14px;}
    .theme-toggle,.btn-primary,.btn-secondary{height:40px;}
    .theme-toggle{width:40px;}
    .btn-primary{padding:0 14px;font-size:14px;}
    .btn-secondary{padding:0 14px;font-size:14px;}
    main{padding:20px 16px 60px;}
    .wrap{padding:0 16px;}
    .cal-cell{min-height:64px;padding:5px;gap:3px;}
    .cal-daynum{font-size:11px;}
    .cal-chip{font-size:9px;padding:2px 4px;}
    .cal-grid{gap:3px;}
    .cal-header-title{min-width:0;font-size:16px;flex:1 1 auto;}
    .cal-header-title-day{min-width:0;}
    .hero-banner{height:30px;margin-top:4px;}
    .row2{flex-direction:column;gap:18px;}
    .modal-body{padding:18px;}
  }
  .empty{text-align:center;padding:80px 20px;color:var(--muted);}
  .empty .display{font-size:22px;margin-bottom:8px;color:var(--ink);}
  .stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:32px;}
  .pill{background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:18px 20px;flex:1 1 200px;}
  .pill .label{display:flex;align-items:center;gap:8px;color:var(--brass);margin-bottom:8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;}
  .pill .value{font-size:30px;font-weight:700;font-family:'Fraunces',Georgia,serif;}
  .pill .value span{font-size:16px;font-weight:400;color:var(--muted);}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:24px;margin-bottom:24px;}
  .card h3{margin:0 0 20px;font-size:18px;}
  .export-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;}
  .export-count{color:var(--muted);font-size:14px;margin:-12px 0 18px;}
  .export-actions{display:flex;flex-direction:column;gap:10px;}
  .export-actions .btn-secondary{width:100%;justify-content:flex-start;}
  @media (max-width:640px){ .export-grid{grid-template-columns:1fr;} }
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  thead th{text-align:left;padding:13px 20px;border-bottom:1px solid var(--line);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;background:var(--zebra);}
  thead th.num,tbody td.num{text-align:right;}
  tbody tr:nth-child(even){background:var(--zebra);}
  tbody td{padding:16px 20px;border-bottom:1px solid var(--line);font-size:15px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  .log-row{cursor:pointer;}
  .log-row:hover{background:var(--brass-soft);}
  .service-badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
  .badge-0{background:var(--c0-soft);color:var(--c0);}
  .badge-1{background:var(--c1-soft);color:var(--c1);}
  .badge-2{background:var(--c2-soft);color:var(--c2);}
  .badge-3{background:var(--c3-soft);color:var(--c3);}
  .badge-4{background:var(--c4-soft);color:var(--c4);}
  .notes{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.4;}
  .unit{color:var(--muted);font-size:12px;}
  .actions-cell{text-align:right;white-space:nowrap;}
  .icon-btn{background:none;border:none;color:var(--muted);font-size:15px;width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;}
  .icon-btn:hover{background:var(--line);color:var(--ink);}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .filter-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;}
  .filter-chip.badge-0{background:var(--c0-soft);color:var(--c0);border-color:transparent;}
  .filter-chip.badge-1{background:var(--c1-soft);color:var(--c1);border-color:transparent;}
  .filter-chip.badge-2{background:var(--c2-soft);color:var(--c2);border-color:transparent;}
  .filter-chip.badge-3{background:var(--c3-soft);color:var(--c3);border-color:transparent;}
  .filter-chip.badge-4{background:var(--c4-soft);color:var(--c4);border-color:transparent;}
  .filter-chip.active{border-color:currentColor;box-shadow:inset 0 0 0 1px currentColor;}
  .filter-chip.all-active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .filter-empty{text-align:center;padding:50px 20px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:6px;}
  .edit-btn{color:var(--brass);}
  .modal-backdrop{position:fixed;inset:0;background:rgba(31,42,36,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal{background:var(--paper);border-radius:6px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--line);}
  .modal-head h2{margin:0;font-size:22px;}
  .modal-body{padding:24px;display:flex;flex-direction:column;gap:18px;}
  .field{display:flex;flex-direction:column;gap:6px;min-width:0;}
  .field span{font-size:13px;font-weight:600;color:var(--field-label);}
  .field-section-label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--brass);font-weight:700;border-top:1px solid var(--line);padding-top:14px;}
  .role-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);}
  .role-row select{width:auto;flex-shrink:0;}
  .role-name{flex:0 0 150px;font-size:14px;font-weight:600;color:var(--field-label);}
  .role-person{flex:1;min-width:0;}
  @media (max-width:640px){
    .role-row{flex-wrap:wrap;}
    .role-name{flex:1 0 100%;}
    .role-person{flex:1 1 auto;}
  }
  .service-locked{display:flex;align-items:center;min-height:41px;}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);color:var(--paper);border-radius:6px;padding:14px 18px;display:flex;align-items:center;gap:16px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;font-size:14px;}
  .toast button{background:none;border:1px solid var(--paper);color:var(--paper);border-radius:4px;padding:6px 12px;font-size:13px;font-weight:700;}
  .toast button:hover{background:var(--paper);color:var(--ink);}
  input,select,textarea{border:1px solid var(--line);border-radius:4px;padding:10px 12px;font-size:15px;background:var(--surface);color:var(--ink);outline:none;font-family:inherit;width:100%;}
  input[type=range]{accent-color:var(--brass);padding:0;}
  .row2{display:flex;gap:12px;}
  .save-btn{margin-top:4px;background:var(--pew);color:var(--paper);border:none;border-radius:4px;padding:13px;font-size:15px;font-weight:700;}
  .close-x{background:none;border:none;color:var(--ink);font-size:20px;}
  .error-banner{background:var(--banner-bg);border:1px solid var(--rust);color:var(--rust);padding:10px 14px;border-radius:4px;margin-bottom:20px;font-size:14px;}
  .chart-box{position:relative;height:260px;}
  .logger-list{margin-top:16px;border-top:1px solid var(--line);padding-top:12px;}
  .logger-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 0;font-size:14px;}
  .logger-name{font-weight:600;}
  .logger-meta{color:var(--muted);font-size:13px;white-space:nowrap;}
  #config-warning{background:var(--banner-bg);border:1px solid var(--rust);color:var(--rust);padding:16px 20px;border-radius:4px;margin:20px 0;font-size:14px;line-height:1.5;}
  code{background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:3px;}
  [data-theme="dark"] code, [data-theme="ocean"] code{background:rgba(255,255,255,0.1);}
  .theme-toggle{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:16px;}
  .btn-secondary{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--surface);color:var(--ink);border:1px solid var(--line);padding:0 18px;font-size:15px;font-weight:600;white-space:nowrap;}
  .btn-secondary:disabled{opacity:.5;cursor:not-allowed;}
  .detail-date{color:var(--muted);font-size:14px;margin-top:-8px;}
  .detail-logged-by{color:var(--muted);font-size:13px;margin-top:-12px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0;}
  .detail-item{background:var(--zebra);border:1px solid var(--line);border-radius:4px;padding:14px 16px;}
  .detail-label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px;}
  .detail-value{font-size:24px;font-weight:700;font-family:'Fraunces',Georgia,serif;}
  .detail-value .unit{font-size:14px;}
  .detail-notes-block{margin-bottom:4px;}
  .detail-notes-block p{margin:6px 0 0;line-height:1.5;}
  .detail-readiness{display:flex;flex-direction:column;gap:2px;}
  .readiness-row{display:flex;align-items:center;gap:8px;font-size:14px;margin-top:6px;}
  .check-yes{color:var(--pew);font-weight:700;}
  .check-no{color:var(--rust);font-weight:700;}
  .detail-actions{display:flex;gap:10px;margin-top:4px;}
  .detail-actions .save-btn{flex:1;margin-top:0;}
  .btn-danger{flex:1;background:none;border:1px solid var(--rust);color:var(--rust);border-radius:4px;padding:13px;font-size:15px;font-weight:700;}
  footer{border-top:1px solid var(--line);}
  .footer-wrap{padding:28px 24px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;}
  .footer-links{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
  .footer-links a{color:var(--brass);text-decoration:none;font-size:14px;font-weight:600;}
  .footer-links a:hover{text-decoration:underline;}
  .footer-meta{color:var(--muted);font-size:12px;}
  .pco-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
  .badge-unmatched{background:var(--zebra);color:var(--muted);border:1px dashed var(--line);}
  .status-pill{border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;letter-spacing:.02em;white-space:nowrap;}
  .status-logged{background:var(--pew);color:var(--paper);}
  .status-pending{background:var(--brass-soft);color:var(--brass);border:1px solid var(--brass);}
  .status-pill:disabled{opacity:.5;cursor:not-allowed;}
  .pco-status-group{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;}
  .pco-plan-cell{display:flex;align-items:center;gap:10px;}
  .pco-artwork{width:40px;height:40px;border-radius:4px;object-fit:cover;flex-shrink:0;border:1px solid var(--line);}
  .pco-artwork-lg{width:56px;height:56px;border-radius:6px;object-fit:cover;flex-shrink:0;border:1px solid var(--line);}
  .pco-linked-note{background:var(--brass-soft);color:var(--brass);border-radius:4px;padding:10px 14px;font-size:13px;font-weight:600;margin-top:-8px;}
  .cal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .cal-header-title{min-width:200px;}
  .cal-header-title-day{min-width:280px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow-row{margin-bottom:6px;}
  .cal-dow{text-align:center;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:4px 0;}
  .cal-cell{background:var(--surface);border:1px solid var(--line);border-radius:4px;min-height:96px;min-width:0;padding:8px;display:flex;flex-direction:column;gap:6px;}
  .cal-cell-empty{background:transparent;border-color:transparent;}
  .cal-cell-today{box-shadow:inset 0 0 0 1px var(--brass);}
  .cal-daynum{font-size:12px;font-weight:700;color:var(--muted);}
  .cal-cell-today .cal-daynum{color:var(--brass);}
  .cal-chips{display:flex;flex-direction:column;gap:4px;}
  .cal-chip{border:none;border-radius:4px;padding:3px 6px;font-size:11px;font-weight:700;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .cal-chip:hover{opacity:.8;}
  .cal-chip.cal-chip-pending{background:transparent;border:1px dashed currentColor;}
  .cal-view-toggle{display:flex;gap:4px;margin-bottom:16px;}
  .cal-toggle-btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:8px 16px;font-size:13px;font-weight:600;border-radius:4px;}
  .cal-toggle-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .cal-daynum-clickable{cursor:pointer;}
  .cal-daynum-clickable:hover{color:var(--brass);}
  .cal-day-rollup{color:var(--muted);font-size:13px;margin-bottom:14px;}
  .cal-day-list{display:flex;flex-direction:column;gap:10px;}
  .cal-chip.cal-day-card{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:14px 16px;white-space:normal;overflow:visible;}
  .cal-chip.cal-day-card:hover{background:var(--brass-soft);}
  .cal-day-card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
  .cal-day-card-stats{display:flex;flex-wrap:wrap;gap:16px;font-size:14px;color:var(--ink);}
  .cal-day-card-stats strong{font-family:'Fraunces',Georgia,serif;font-size:17px;}
  .cal-day-card-logged-by{font-size:12px;color:var(--muted);margin-top:6px;}

  @media print{
    header, footer, #modal-slot, #toast-slot, #error-slot, #config-slot, button{display:none !important;}
    body{background:#fff;color:#000;}
    main{padding:0;max-width:100%;}
    .card{break-inside:avoid;border:1px solid #ccc;box-shadow:none;}
    .chart-box{height:240px;}
    .pill,.detail-item{border:1px solid #ccc;}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="headtop">
      <div>
        <img class="logo" id="logo-img" src="assets/SkylinePulseLight-removebg-preview.png" alt="Skyline Pulse">
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="theme-toggle" id="theme-toggle" title="Cycle theme (Light / Dark / Ocean)"></button>
        <button class="btn-secondary" id="open-production-form-btn">+ Log Production</button>
        <button class="btn-primary" id="open-form-btn">+ Log a Service</button>
      </div>
    </div>
    <div class="page-toggle">
      <button class="page-toggle-btn active" id="page-logging">Logging</button>
      <button class="page-toggle-btn" id="page-analytics">Analytics</button>
      <button class="page-toggle-btn" id="page-exports">Exports</button>
    </div>
    <nav>
      <button id="tab-pco" class="active">Planning Center</button>
      <button id="tab-production">Production</button>
      <button id="tab-skyyouth">SkyYouth</button>
      <button id="tab-log">Services</button>
      <button id="tab-calendar">Calendar</button>
      <button id="tab-analytics">Services Analytics</button>
      <button id="tab-production-analytics">Production Analytics</button>
      <button id="tab-skyyouth-analytics">SkyYouth Analytics</button>
    </nav>
    <svg class="hero-banner" viewBox="0 0 1000 60" preserveAspectRatio="none" aria-hidden="true">
      <path class="hero-skyline" d="M0,60 L0,48 L18,48 L18,40 L34,40 L34,52 L54,52 L54,26 L70,26 L70,44 L92,44 L92,16 L112,16 L112,44 L132,44 L132,35 L152,35 L152,50 L178,50 L178,20 L198,20 L198,50 L1000,50 L1000,60 Z"></path>
      <path class="hero-pulse-line" d="M0,32 H360 L374,32 L386,12 L398,48 L410,20 L422,32 H478 L494,32 L498,8 L502,8 L506,32 H1000"></path>
      <g class="hero-cross">
        <line x1="500" y1="10" x2="500" y2="30"></line>

/* Best-effort mapping from Planning Center Service Type folder names to the

const PCO_SERVICE_TYPE_ALIASES = {

/* Production/tech roles tracked per service. Add a row here (and a matching
   set of `<key>_present`/`<key>_name` columns in db/schema.sql) to track a
   new role — the modal form and list view are both generated from this. */

let sb = null;

let productionEntries = [];
let view = "pco";
let page = "logging";

let lastAnalyticsView = "analytics";
let charts = [];
let filterType = "All";
let pcoPlans = [];
let pcoError = null;
let pcoLoaded = false;
let pcoLoading = false;
let pcoFilterTypes = new Set();
let skyYouthFilterTypes = new Set();
let calendarMonth = null;
let calendarView = "day";
let calendarDay = null;

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function getCalendarEvents() {
  const events = entries.map(e => ({
    date: e.service_date,
    kind: "entry",
    id: e.id,
    serviceType: e.service_type,
    label: e.service_type,
    logged: true,
    entry: e,
  }));
  pcoPlans.forEach(p => {
    const matched = guessServiceType(p.plan_time_name || p.service_type_name);
    const alreadyLogged = entries.some(e => e.pco_plan_id === p.plan_id && (!matched || e.service_type === matched));
    if (alreadyLogged) return;
    events.push({
      date: p.sort_date.slice(0, 10),
      kind: "pco",
      id: p.id,
      serviceType: matched,
      label: p.title,
      logged: false,
      plan: p,
    });
  });
  return events;
}

function badgeClass(serviceType) {
  const idx = SERVICE_TYPES.indexOf(serviceType);
  return `badge-${idx >= 0 ? idx % 5 : 0}`;
}

function guessServiceType(pcoName) {
  const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  const n = norm(pcoName);
  for (const s of SERVICE_TYPES) if (norm(s) === n) return s;
  for (const [s, aliases] of Object.entries(PCO_SERVICE_TYPE_ALIASES)) {
    if (aliases.some(a => n.includes(norm(a)))) return s;
  }
  return "";
}

// SkyYouth gets its own tab, so the main Planning Center tab and the
// SkyYouth tab split the same `pcoPlans` list by the plan's underlying PCO
// Service Type folder (not the split-out plan_time_name, which only exists
// for multi-time folders like Celebration Service).
function isSkyYouthPlan(p) {
  return guessServiceType(p.service_type_name) === "SkyYouth";
}

function skyYouthEntries() {
  return entries.filter(e => e.service_type === "SkyYouth");
}

function yesNoSelect(id, value) {
  return `<select id="${id}">
    <option value="yes" ${value ? "selected" : ""}>Yes</option>
    <option value="no" ${!value ? "selected" : ""}>No</option>
  </select>`;
}

function readinessRow(value, label) {
  return `<div class="readiness-row"><span class="${value ? "check-yes" : "check-no"}">${value ? "✓" : "✕"}</span> ${escapeHtml(label)}</div>`;
}

const THEME_CYCLE = ["light", "dark", "ocean"];
const THEME_ICONS = { light: "☾", dark: "≈", ocean: "☀" };

function getStoredTheme() {
  const stored = localStorage.getItem("skyline-theme");
  if (stored && THEME_CYCLE.includes(stored)) return stored;
  return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}
function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("skyline-theme", theme);
  document.getElementById("theme-toggle").textContent = THEME_ICONS[theme];
  document.getElementById("logo-img").src = theme === "light" ? LOGO_LIGHT : LOGO_DARK;
  if (view === "analytics" && charts.length) { destroyCharts(); renderCharts(); }
}
function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme");
  const next = THEME_CYCLE[(THEME_CYCLE.indexOf(current) + 1) % THEME_CYCLE.length];
  applyTheme(next);
}

function configured() {
  return SUPABASE_URL !== "YOUR_SUPABASE_PROJECT_URL" && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";
}

function fmtDate(d) {
  const dt = new Date(d + "T12:00:00");
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function pctTrueIn(arr, field) { return arr.length ? Math.round(100 * arr.filter(e => e[field]).length / arr.length) : 0; }
function pctTrue(field) { return pctTrueIn(entries, field); }
function showError(msg) {
  document.getElementById("error-slot").innerHTML = msg ? `<div class="error-banner">${msg}</div>` : "";
}

async function loadEntries() {
  if (!configured()) return;
  const { data, error } = await sb.from("service_entries").select("*").order("service_date", { ascending: false });
  if (error) { showError("Couldn't load entries: " + error.message); return; }
  entries = data;
  render();
}

function saveErrorMessage(error, payload) {
  if (error.code === "23505" && payload.pco_plan_id) {
    return `You've already logged "${payload.service_type}" for this Planning Center plan.`;
  }
  return "Couldn't save: " + error.message;
}

async function addEntry(payload) {
  const { error } = await sb.from("service_entries").insert([payload]);
  if (error) { showError(saveErrorMessage(error, payload)); return false; }
  showError("");
  await loadEntries();
  return true;
}

let undoTimeoutId = null;

async function removeEntry(id) {
  const entry = entries.find(e => e.id === id);
  const { error } = await sb.from("service_entries").delete().eq("id", id);
  if (error) { showError("Couldn't delete: " + error.message); return; }
  await loadEntries();
  if (entry) showUndoToast(entry);
}

function showUndoToast(deletedEntry) {
  clearTimeout(undoTimeoutId);
  document.getElementById("toast-slot").innerHTML = `
    <div class="toast">
      <span>Entry deleted.</span>
      <button id="undo-btn">Undo</button>
    </div>`;
  document.getElementById("undo-btn").addEventListener("click", async () => {
    clearTimeout(undoTimeoutId);
    document.getElementById("toast-slot").innerHTML = "";
    const { id, created_at, ...payload } = deletedEntry;
    await addEntry(payload);
  });
  undoTimeoutId = setTimeout(() => { document.getElementById("toast-slot").innerHTML = ""; }, 7000);
}

async function updateEntry(id, payload) {
  const { error } = await sb.from("service_entries").update(payload).eq("id", id);
  if (error) { showError(saveErrorMessage(error, payload)); return false; }
  showError("");
  await loadEntries();
  return true;
}

async function loadProductionEntries() {
  if (!configured()) return;
  const { data, error } = await sb.from("production_entries").select("*").order("service_date", { ascending: false });
  if (error) { showError("Couldn't load production entries: " + error.message); return; }
  productionEntries = data;
  render();
}

async function addProductionEntry(payload) {
  const { error } = await sb.from("production_entries").insert([payload]);

  showError("");
  await loadProductionEntries();

}

async function updateProductionEntry(id, payload) {

  if (error) { showError("Couldn't save: " + error.message); return false; }
  showError("");
  await loadProductionEntries();

async function removeProductionEntry(id) {

function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

function printReport(targetView) {
  setView(targetView);
  setTimeout(() => window.print(), 350);
}

function setView(v) {
  view = v;
  if (LOGGING_VIEWS.includes(v)) { page = "logging"; lastLoggingView = v; }
  else if (ANALYTICS_VIEWS.includes(v)) { page = "analytics"; lastAnalyticsView = v; }
  else if (v === "exports") { page = "exports"; }
  render();
}

function render() {
  const content = document.getElementById("content");
  document.getElementById("tab-log").classList.toggle("active", view === "log");
  document.getElementById("tab-calendar").classList.toggle("active", view === "calendar");
  document.getElementById("tab-analytics").classList.toggle("active", view === "analytics");
  document.getElementById("tab-pco").classList.toggle("active", view === "pco");
  document.getElementById("tab-skyyouth").classList.toggle("active", view === "skyyouth");
  document.getElementById("tab-production").classList.toggle("active", view === "production");
  document.getElementById("tab-production-analytics").classList.toggle("active", view === "production-analytics");
  document.getElementById("tab-skyyouth-analytics").classList.toggle("active", view === "skyyouth-analytics");
  document.getElementById("page-logging").classList.toggle("active", page === "logging");
  document.getElementById("page-analytics").classList.toggle("active", page === "analytics");
  document.getElementById("page-exports").classList.toggle("active", page === "exports");
  LOGGING_VIEWS.forEach(v => document.getElementById(`tab-${v}`).classList.toggle("page-hidden", page !== "logging"));
  ANALYTICS_VIEWS.forEach(v => document.getElementById(`tab-${v}`).classList.toggle("page-hidden", page !== "analytics"));
  destroyCharts();

  if (!configured()) {
    document.getElementById("config-slot").innerHTML = `<div id="config-warning">
      <strong>Not connected yet.</strong> Open <code>index.html</code> and set <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> at the top of the script to your Supabase project's values, then redeploy.
    </div>`;
    content.innerHTML = "";
    return;
  } else {
    document.getElementById("config-slot").innerHTML = "";
  }

  if (view === "pco") {
    content.innerHTML = renderPco();
    wirePcoTabHandlers(content, pcoFilterTypes);
    if (!pcoLoaded) loadPcoPlans();
    return;
  }

  if (view === "skyyouth") {
    content.innerHTML = renderSkyYouth();
    wirePcoTabHandlers(content, skyYouthFilterTypes);
    if (!pcoLoaded) loadPcoPlans();
    return;
  }

  if (view === "calendar") {
    content.innerHTML = renderCalendar();
    const viewMonthBtn = document.getElementById("cal-view-month");
    const viewDayBtn = document.getElementById("cal-view-day");
    if (viewMonthBtn) viewMonthBtn.addEventListener("click", () => { calendarView = "month"; render(); });
    if (viewDayBtn) viewDayBtn.addEventListener("click", () => { calendarView = "day"; render(); });

    const prevBtn = document.getElementById("cal-prev");
    const nextBtn = document.getElementById("cal-next");
    const todayBtn = document.getElementById("cal-today");
    if (prevBtn) prevBtn.addEventListener("click", () => {
      if (calendarView === "day") calendarDay = new Date(calendarDay.getFullYear(), calendarDay.getMonth(), calendarDay.getDate() - 1);
      else calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() - 1, 1);
      render();
    });
    if (nextBtn) nextBtn.addEventListener("click", () => {
      if (calendarView === "day") calendarDay = new Date(calendarDay.getFullYear(), calendarDay.getMonth(), calendarDay.getDate() + 1);
      else calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + 1, 1);
      render();
    });
    if (todayBtn) todayBtn.addEventListener("click", () => {
      if (calendarView === "day") calendarDay = new Date();
      else calendarMonth = null;
      render();
    });

    content.querySelectorAll(".cal-daynum-clickable").forEach(el => {
      el.addEventListener("click", () => {
        const [y, m, d] = el.dataset.date.split("-").map(Number);
        calendarDay = new Date(y, m - 1, d);
        calendarView = "day";
        render();
      });
    });

    content.querySelectorAll(".cal-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        if (chip.dataset.kind === "entry") {
          const entry = entries.find(e => e.id === chip.dataset.id);
          if (entry) openDetail(entry);
        } else {
          const plan = pcoPlans.find(p => p.id === chip.dataset.id);
          if (plan) openModal(null, plan);
        }
      });
    });
    if (!pcoLoaded) loadPcoPlans();
    return;
  }

  if (view === "production") {
    content.innerHTML = renderProduction();
    const addBtn = document.getElementById("production-add-btn");
    if (addBtn) addBtn.addEventListener("click", () => openProductionModal());
    content.querySelectorAll(".prod-row").forEach(row => {
      row.addEventListener("click", () => openProductionModal(productionEntries.find(en => en.id === row.dataset.id)));
    });
    content.querySelectorAll(".prod-del-btn").forEach(btn => {
      btn.addEventListener("click", (e) => { e.stopPropagation(); removeProductionEntry(btn.dataset.id); });
    });
    return;
  }

  if (view === "production-analytics") {
    content.innerHTML = renderProductionAnalyticsShell();
    renderProductionCharts();
    return;
  }

  if (view === "skyyouth-analytics") {
    const data = skyYouthEntries();
    content.innerHTML = renderAnalyticsShell(data, { emptyBody: "Log a SkyYouth service to see trends here." });
    renderCharts(data);
    return;
  }

  if (view === "exports") {
    content.innerHTML = renderExports();
    document.getElementById("export-services-csv").addEventListener("click", exportCSV);
    document.getElementById("export-services-pdf").addEventListener("click", exportServicesPDF);
    document.getElementById("export-production-csv").addEventListener("click", exportProductionCSV);
    document.getElementById("export-production-pdf").addEventListener("click", exportProductionPDF);
    document.getElementById("export-skyyouth-csv").addEventListener("click", exportSkyYouthCSV);
    document.getElementById("export-skyyouth-pdf").addEventListener("click", exportSkyYouthPDF);
    document.getElementById("print-services-analytics").addEventListener("click", () => printReport("analytics"));
    document.getElementById("print-production-analytics").addEventListener("click", () => printReport("production-analytics"));
    document.getElementById("print-skyyouth-analytics").addEventListener("click", () => printReport("skyyouth-analytics"));
    return;
  }

  if (entries.length === 0) {
    content.innerHTML = `<div class="empty">
      <div class="display">Nothing logged yet.</div>
      <div>Log your first service to start tracking attendance, unity, engagement, and loudness.</div>
    </div>`;
    return;
  }

  if (view === "log") {
    content.innerHTML = renderLog();
    content.querySelectorAll(".del-btn").forEach(btn => {
      btn.addEventListener("click", (e) => { e.stopPropagation(); removeEntry(btn.dataset.id); });
    });
    content.querySelectorAll(".edit-btn").forEach(btn => {
      btn.addEventListener("click", (e) => { e.stopPropagation(); openModal(entries.find(en => en.id === btn.dataset.id)); });
    });
    content.querySelectorAll(".log-row").forEach(row => {
      row.addEventListener("click", () => openDetail(entries.find(en => en.id === row.dataset.id)));
    });
    content.querySelectorAll(".filter-chip").forEach(chip => {
      chip.addEventListener("click", () => { filterType = chip.dataset.filter; render(); });
    });
  } else {
    content.innerHTML = renderAnalyticsShell();
    renderCharts();
  }
}

function renderLog() {
  const typesPresent = SERVICE_TYPES.filter(s => entries.some(e => e.service_type === s));
  const filterRow = `<div class="filter-row">
    <button class="filter-chip ${filterType === "All" ? "all-active" : ""}" data-filter="All">All (${entries.length})</button>
    ${typesPresent.map(s => {
      const count = entries.filter(e => e.service_type === s).length;
      return `<button class="filter-chip ${badgeClass(s)} ${filterType === s ? "active" : ""}" data-filter="${escapeHtml(s)}">${escapeHtml(s)} (${count})</button>`;
    }).join("")}
  </div>`;

  const filtered = filterType === "All" ? entries : entries.filter(e => e.service_type === filterType);

  if (filtered.length === 0) {
    return `${filterRow}<div class="filter-empty">No entries for ${escapeHtml(filterType)}.</div>`;
  }

  const rows = filtered.map(e => `
    <tr class="log-row" data-id="${e.id}">
      <td>${fmtDate(e.service_date)}</td>
      <td><span class="service-badge ${badgeClass(e.service_type)}">${escapeHtml(e.service_type)}</span>${e.notes ? `<div class="notes">${escapeHtml(e.notes)}</div>` : ""}</td>
      <td class="num">${e.attendance.toLocaleString()}</td>
      <td class="num">${e.unity}<span class="unit">/5</span></td>
      <td class="num">${e.engagement}<span class="unit">/5</span></td>
      <td class="num">${e.loudness_db}<span class="unit"> dB</span></td>
      <td class="actions-cell">
        <button class="icon-btn edit-btn" data-id="${e.id}" title="Edit">✎</button>
        <button class="icon-btn del-btn" data-id="${e.id}" title="Delete">✕</button>
      </td>
    </tr>`).join("");
  return `${filterRow}<div class="table-scroll"><table>
    <thead><tr><th>Date</th><th>Service</th><th class="num">Attend.</th><th class="num">Unity</th><th class="num">Engage.</th><th class="num">dB</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderProduction() {
  const header = `<div class="pco-header">
    <div>
      <h3 class="display" style="margin:0 0 4px;">Production</h3>
      <div style="color:var(--muted);font-size:13px;">Role attendance and tech requirements for each service. More fields coming as the team defines them.</div>
    </div>
    <button class="btn-primary" id="production-add-btn">+ Log Production</button>
  </div>`;

  if (productionEntries.length === 0) {
    return `${header}<div class="empty">
      <div class="display">Nothing logged yet.</div>
      <div>Log role attendance and tech notes for a service to start tracking.</div>
    </div>`;
  }

  const rows = productionEntries.map(e => {
    const presentCount = PRODUCTION_ROLES.filter(r => e[`${r.key}_present`]).length;
    return `
    <tr class="prod-row" data-id="${e.id}">
      <td>${fmtDate(e.service_date)}</td>
      <td><span class="service-badge ${badgeClass(e.service_type)}">${escapeHtml(e.service_type)}</span></td>
      <td class="num">${presentCount}/${PRODUCTION_ROLES.length}</td>
      <td>${e.slides_sync_fit ? "✓" : "✕"} Slides &nbsp; ${e.camera_direction_fit ? "✓" : "✕"} Camera</td>
      <td>${e.logged_by ? escapeHtml(e.logged_by) : "—"}</td>
      <td class="actions-cell">
        <button class="icon-btn prod-del-btn" data-id="${e.id}" title="Delete">✕</button>
      </td>
    </tr>`;
  }).join("");

  return `${header}<div class="table-scroll"><table>
    <thead><tr><th>Date</th><th>Service</th><th class="num">Roles Present</th><th>Fit Checks</th><th>Logged By</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}

function csvEscape(val) {
  const s = String(val ?? "");
  return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function downloadBlob(content, mime, filename) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function servicesCSVRows(data) {
  const header = [
    "Date", "Service", "Attendance", "Unity (1-5)", "Engagement (1-5)", "Loudness (dB)",
    "Sound Clarity (Y/N)", "Spiritual Response (0-10)", "Transition Clarity (1-5)",
    "Lighting Fit (Y/N)", "Talking Fit (Y/N)", "Announcements Fit (Y/N)", "Sermon Fit (Y/N)", "Notes", "Logged By",
  ];
  const rows = data.map(e => [
    e.service_date, e.service_type, e.attendance, e.unity, e.engagement, e.loudness_db,
    e.sound_clarity ? "Y" : "N", e.spiritual_response, e.transition_clarity,
    e.lighting_fit ? "Y" : "N", e.talking_fit ? "Y" : "N", e.announcements_fit ? "Y" : "N", e.sermon_fit ? "Y" : "N", e.notes || "", e.logged_by || "",
  ]);
  return [header, ...rows].map(r => r.map(csvEscape).join(",")).join("\r\n");
}

function exportCSV() {
  if (!entries.length) return;
  downloadBlob(servicesCSVRows(entries), "text/csv;charset=utf-8;", `skyline-pulse-services-${new Date().toISOString().slice(0,10)}.csv`);
}

function exportSkyYouthCSV() {
  const data = skyYouthEntries();
  if (!data.length) return;

function loggedByCountsIn(arr) {
  const byName = new Map();
  arr.forEach(e => {
    if (!e.logged_by) return;
    const cur = byName.get(e.logged_by) || { name: e.logged_by, count: 0, lastDate: e.service_date };
    cur.count += 1;
    if (e.service_date > cur.lastDate) cur.lastDate = e.service_date;
    byName.set(e.logged_by, cur);
  });
  return [...byName.values()].sort((a, b) => b.count - a.count);
}
function loggedByCounts() { return loggedByCountsIn(entries); }

    c0: v("--c0"), c1: v("--c1"), c2: v("--c2"), c3: v("--c3"), c4: v("--c4"),
  };
}

async function loadPcoPlans(force) {
  if (pcoLoading) return;
  if (!force && pcoLoaded) return;
  pcoLoading = true;
  pcoError = null;
  if (force) render();
  try {
    const res = await fetch("/api/pco-plans");
    const body = await res.json().catch(() => ({}));
    if (!res.ok) {
      pcoError = body.error || `Planning Center request failed (${res.status}).`;
      pcoPlans = [];
    } else {
      pcoPlans = body.plans || [];
    }
  } catch (err) {
    pcoError = "Couldn't reach Planning Center: " + err.message;
    pcoPlans = [];
  }
  pcoLoading = false;
  pcoLoaded = true;
  render();
}

function renderPcoSection(plans, filterState, opts) {
  const header = `<div class="pco-header">
    <div>
      <h3 class="display" style="margin:0 0 4px;">${opts.title}</h3>
      <div style="color:var(--muted);font-size:13px;">${opts.subtitle}</div>
    </div>
    <button class="btn-secondary" id="pco-refresh" ${pcoLoading ? "disabled" : ""}>${pcoLoading ? "↻ Refreshing…" : "↻ Refresh"}</button>
  </div>`;

  if (!pcoLoaded) {
    return `${header}<div class="empty"><div class="display">Loading Planning Center plans…</div></div>`;
  }
  if (pcoError) {
    return `${header}<div class="error-banner">${escapeHtml(pcoError)}</div>`;
  }
  if (plans.length === 0) {
    return `${header}<div class="empty">
      <div class="display">${opts.emptyTitle}</div>
      <div>${opts.emptyBody}</div>
    </div>`;
  }

  const pcoRowLabel = p => guessServiceType(p.plan_time_name || p.service_type_name) || p.service_type_name;

  const typesPresent = [...new Set(plans.map(pcoRowLabel))].sort();
  const filterRow = typesPresent.length <= 1 ? "" : `<div class="filter-row">
    <button class="filter-chip ${filterState.size === 0 ? "all-active" : ""}" data-filter="All">All (${plans.length})</button>
    ${typesPresent.map(label => {
      const matched = SERVICE_TYPES.includes(label) ? label : "";
      const cls = matched ? badgeClass(matched) : "badge-unmatched";
      const count = plans.filter(p => pcoRowLabel(p) === label).length;
      return `<button class="filter-chip ${cls} ${filterState.has(label) ? "active" : ""}" data-filter="${escapeHtml(label)}">${escapeHtml(label)} (${count})</button>`;
    }).join("")}
  </div>`;

  const filteredPlans = filterState.size === 0 ? plans : plans.filter(p => filterState.has(pcoRowLabel(p)));

  if (filteredPlans.length === 0) {
    return `${header}${filterRow}<div class="filter-empty">No plans for ${[...filterState].map(escapeHtml).join(", ")}.</div>`;
  }

  const entriesByPlan = {};
  entries.forEach(e => {
    if (!e.pco_plan_id) return;
    (entriesByPlan[e.pco_plan_id] ||= []).push(e);
  });

  const todayStr = new Date().toISOString().slice(0, 10);

  const rows = filteredPlans.map(p => {
    const matchSource = p.plan_time_name || p.service_type_name;
    const matched = guessServiceType(matchSource);
    const badge = matched
      ? `<span class="service-badge ${badgeClass(matched)}">${escapeHtml(matched)}</span>`
      : `<span class="service-badge badge-unmatched">${escapeHtml(matchSource)}</span>`;
    const linked = (entriesByPlan[p.plan_id] || []).filter(e => !matched || e.service_type === matched);
    const loggedPills = linked.map(e =>
      `<button class="status-pill status-logged pco-view-btn" data-id="${escapeHtml(e.id)}">${escapeHtml(e.service_type)} ✓</button>`
    ).join("");
    const isFuture = p.sort_date.slice(0, 10) > todayStr;
    const logBtn = isFuture
      ? `<button class="status-pill status-pending" disabled title="Available once the service happens">Upcoming</button>`
      : `<button class="status-pill status-pending pco-log-btn" data-id="${escapeHtml(p.id)}">${linked.length ? "+ Log another" : "Needs details"}</button>`;
    return `<tr>
      <td>${fmtDate(p.sort_date.slice(0,10))}${p.plan_time_name ? `<div class="notes">${escapeHtml(p.plan_time_name)}</div>` : ""}</td>
      <td>
        <div class="pco-plan-cell">
          ${p.artwork_url ? `<img class="pco-artwork" src="${escapeHtml(p.artwork_url)}" alt="">` : ""}
          <div>
            ${badge}
            <div class="notes">${escapeHtml(p.title)}${p.series_title ? " · " + escapeHtml(p.series_title) : ""}</div>
          </div>
        </div>
      </td>
      <td class="actions-cell"><div class="pco-status-group">${loggedPills}${logBtn}</div></td>
    </tr>`;
  }).join("");

  return `${header}${filterRow}<div class="table-scroll"><table>
    <thead><tr><th>Date</th><th>Plan</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

  const refreshBtn = document.getElementById("pco-refresh");
  if (refreshBtn) refreshBtn.addEventListener("click", () => loadPcoPlans(true));
  content.querySelectorAll(".pco-log-btn").forEach(btn => {
    btn.addEventListener("click", () => openModal(null, pcoPlans.find(p => p.id === btn.dataset.id)));
  });
  content.querySelectorAll(".pco-view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const entry = entries.find(e => e.id === btn.dataset.id);
      if (entry) openDetail(entry);
    });
  });
  content.querySelectorAll(".filter-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const val = chip.dataset.filter;
      if (val === "All") filterState.clear();
      else if (filterState.has(val)) filterState.delete(val);
      else filterState.add(val);
      render();
    });
  });
}

function renderCalendar() {
  const toggle = `<div class="cal-view-toggle">
    <button class="cal-toggle-btn ${calendarView === "month" ? "active" : ""}" id="cal-view-month">Month</button>
    <button class="cal-toggle-btn ${calendarView === "day" ? "active" : ""}" id="cal-view-day">Day</button>
  </div>`;
  return toggle + (calendarView === "day" ? renderCalendarDay() : renderCalendarMonth());
}

function renderCalendarMonth() {
  if (!calendarMonth) {
    const t = new Date();
    calendarMonth = new Date(t.getFullYear(), t.getMonth(), 1);
  }
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();
  const monthLabel = calendarMonth.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = dateKey(new Date());

  const byDate = {};
  getCalendarEvents().forEach(ev => { (byDate[ev.date] ||= []).push(ev); });

  const header = `<div class="cal-header">
    <button class="btn-secondary" id="cal-prev" title="Previous month">‹</button>
    <h3 class="display cal-header-title" style="margin:0;text-align:center;">${monthLabel}</h3>
    <button class="btn-secondary" id="cal-next" title="Next month">›</button>
    <button class="btn-secondary" id="cal-today" style="margin-left:auto;">Today</button>
  </div>`;

  const dowLabels = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const dowRow = dowLabels.map(d => `<div class="cal-dow">${d}</div>`).join("");

  let cells = "";
  for (let i = 0; i < firstDow; i++) cells += `<div class="cal-cell cal-cell-empty"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    const dayEvents = byDate[dateStr] || [];
    const chips = dayEvents.map(ev => {
      const badgeCls = ev.serviceType ? badgeClass(ev.serviceType) : "badge-unmatched";
      const label = ev.serviceType || ev.label;
      const statusCls = ev.logged ? "cal-chip-logged" : "cal-chip-pending";
      return `<button class="cal-chip ${badgeCls} ${statusCls}" data-kind="${ev.kind}" data-id="${escapeHtml(ev.id)}" title="${escapeHtml(ev.label)}">${escapeHtml(label)}</button>`;
    }).join("");
    cells += `<div class="cal-cell ${dateStr === todayStr ? "cal-cell-today" : ""}">
      <div class="cal-daynum cal-daynum-clickable" data-date="${dateStr}">${day}</div>
      <div class="cal-chips">${chips}</div>
    </div>`;
  }

  return `${header}
    <div class="cal-grid cal-dow-row">${dowRow}</div>
    <div class="cal-grid">${cells}</div>`;
}

function renderCalendarDay() {
  if (!calendarDay) calendarDay = new Date();
  const dateStr = dateKey(calendarDay);
  const dayLabel = calendarDay.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

  const header = `<div class="cal-header">
    <button class="btn-secondary" id="cal-prev" title="Previous day">‹</button>
    <h3 class="display cal-header-title cal-header-title-day" style="margin:0;text-align:center;">${dayLabel}</h3>
    <button class="btn-secondary" id="cal-next" title="Next day">›</button>
    <button class="btn-secondary" id="cal-today" style="margin-left:auto;">Today</button>
  </div>`;

  const dayEvents = getCalendarEvents().filter(ev => ev.date === dateStr);

  if (dayEvents.length === 0) {
    return `${header}<div class="empty">
      <div class="display">Nothing scheduled.</div>
      <div>No logged services or Planning Center plans for this day.</div>
    </div>`;
  }

  const loggedEvents = dayEvents.filter(ev => ev.logged);
  const totalAttendance = loggedEvents.reduce((sum, ev) => sum + (ev.entry.attendance || 0), 0);
  const rollup = loggedEvents.length
    ? `<div class="cal-day-rollup">${loggedEvents.length} of ${dayEvents.length} logged · Combined attendance: ${totalAttendance.toLocaleString()}</div>`
    : `<div class="cal-day-rollup">${dayEvents.length} plan${dayEvents.length === 1 ? "" : "s"}, none logged yet</div>`;

  const cards = dayEvents.map(ev => {
    const badgeCls = ev.serviceType ? badgeClass(ev.serviceType) : "badge-unmatched";
    const label = ev.serviceType || ev.label;
    if (ev.logged) {
      const e = ev.entry;
      return `<button class="cal-chip cal-day-card cal-day-card-logged" data-kind="entry" data-id="${escapeHtml(ev.id)}">
        <div class="cal-day-card-head">
          <span class="service-badge ${badgeCls}">${escapeHtml(label)}</span>
          <span class="status-pill status-logged">Logged ✓</span>
        </div>
        <div class="cal-day-card-stats">
          <span><strong>${e.attendance.toLocaleString()}</strong> attendance</span>
          <span><strong>${e.unity}</strong>/5 unity</span>
          <span><strong>${e.engagement}</strong>/5 engagement</span>
          <span><strong>${e.loudness_db}</strong> dB</span>
        </div>
        ${e.logged_by ? `<div class="cal-day-card-logged-by">Logged by ${escapeHtml(e.logged_by)}</div>` : ""}
        ${e.notes ? `<div class="notes">${escapeHtml(e.notes)}</div>` : ""}
      </button>`;
    }
    return `<button class="cal-chip cal-day-card" data-kind="pco" data-id="${escapeHtml(ev.id)}">
      <div class="cal-day-card-head">
        <span class="service-badge ${badgeCls}">${escapeHtml(label)}</span>
        <span class="status-pill status-pending">Needs details</span>
      </div>
      <div class="notes">${escapeHtml(ev.label)}</div>
    </button>`;
  }).join("");

  return `${header}${rollup}<div class="cal-day-list">${cards}</div>`;
}
